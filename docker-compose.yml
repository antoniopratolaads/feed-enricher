services:
  feed-enricher:
    build: .
    container_name: feed-enricher
    restart: unless-stopped
    ports:
      - "8501:8501"
    volumes:
      - feed_enricher_data:/root/.feed_enricher
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  feed_enricher_data:
